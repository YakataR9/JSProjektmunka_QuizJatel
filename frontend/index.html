<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Trivia Játék</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Sport Trivia</h1>

    <div id="start-screen">

        <input type="text" id="player-name" placeholder="Neved">

        <button id="start-btn">
            Játék indítása
        </button>

        <p id="error"></p>

    </div>

    <div id="game-screen" class="hidden">

        <div class="top-bar">

            <p id="question-number"></p>

            <p>Pont: <span id="score">0</span></p>

            <p>Idő: <span id="timer">15</span></p>

        </div>

        <h2 id="question"></h2>

        <div id="answers"></div>

        <button id="next-btn">
            Következő kérdés
        </button>

    </div>

    <div id="end-screen" class="hidden">

        <h2>Játék vége</h2>

        <p id="final-score"></p>

        <button onclick="location.reload()">
            Új játék
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
